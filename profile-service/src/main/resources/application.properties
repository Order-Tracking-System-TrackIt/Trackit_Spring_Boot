# Server Configuration
server.port=8086
spring.application.name=profile-service

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/local/trackit_db


# Logging
logging.level.com.trackit.profile=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# Disable Spring Security (if you have it)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration

# CORS Configuration (if needed for frontend)
spring.web.cors.allowed-origins=http://localhost:3000,http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*