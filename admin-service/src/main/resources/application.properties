trackit.jwt.secret=YourBase64EncodedSecretKeyHere1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ=
trackit.jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:5173