# Server Configuration
server.port=9094
spring.application.name=payment-service

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/trackit_payments
spring.data.mongodb.auto-index-creation=true

# Order Service URL (for Feign Client)
order.service.url=http://localhost:9092

# Razorpay Configuration
razorpay.key.id=YOUR_API_ID
razorpay.key.secret=YOUR_API_KEY

# JWT Configuration
trackit.jwt.secret=YourBase64EncodedSecretKeyHere1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ=
trackit.jwt.expiration=86400000


# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=YOUR_EMAIL_ID
spring.mail.password=YOUR_EMAIL_PASSWORD

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=10000
spring.mail.properties.mail.smtp.timeout=10000
spring.mail.properties.mail.smtp.writetimeout=10000

# Debug - set to true to see detailed SMTP logs
spring.mail.properties.mail.smtp.debug=true

# App email settings
app.email.from=YOUR_EMAIL_ID             
app.email.from-name=TrackIt Logistics
app.email.enabled=true

# Logging
logging.level.com.trackit.payment=DEBUG
logging.level.com.razorpay=DEBUG
logging.level.org.springframework.mail=DEBUG
