# Server Configuration
server.port=9092
spring.application.name=order-service

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/trackit_orders
spring.data.mongodb.auto-index-creation=true

# Payment Service URL (for Feign Client)
payment.service.url=http://localhost:9094

# JWT Configuration
trackit.jwt.secret=YourBase64EncodedSecretKeyHere1234567890ABCDEFGHIJKLMNOPQRSTUVWXYZ=
trackit.jwt.expiration=86400000

# Logging
logging.level.com.trackit.order=DEBUG
logging.level.org.springframework.security=DEBUG